{% extends 'main/base.html' %}
{% block content %}
<section class="py-20 bg-slate-50 min-h-screen">
    <div class="container mx-auto px-6">
        <h1 class="text-4xl font-extrabold mb-12 text-center">Latest SEO Insights</h1>
        <div class="grid md:grid-cols-3 gap-10">
            {% for post in posts %}
            <div class="bg-white rounded-3xl shadow-lg overflow-hidden border border-slate-100">
                <div class="p-8">
                    <h2 class="text-2xl font-bold mb-4 text-slate-900">{{ post.title }}</h2>
                    <p class="text-slate-500 mb-6">{{ post.content|truncatewords:20 }}</p>
                    <a href="{% url 'blog_detail' post.slug %}" class="text-blue-600 font-bold hover:underline">Read Full Article →</a>
                </div>
            </div>
            {% empty %}
            <p class="text-center col-span-3 text-gray-500">No articles published yet.</p>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
