{% extends 'main/base.html' %}
{% block content %}
<section class="py-20 bg-white">
    <div class="container mx-auto px-6 max-w-4xl">
        <h1 class="text-5xl font-extrabold text-center mb-10">Get in <span class="text-blue-600">Touch</span></h1>
        <div class="bg-slate-50 p-10 rounded-[2rem] shadow-xl border border-slate-100">
            <form action="#" method="POST" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Your Name</label>
                        <input type="text" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-600 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                        <input type="email" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-600 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Subject (SEO, Guest Posting, etc.)</label>
                    <input type="text" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-600 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Message</label>
                    <textarea rows="5" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-600 outline-none"></textarea>
                </div>
                <button class="bg-blue-600 text-white w-full py-5 rounded-2xl font-bold text-lg hover:bg-blue-700 transition">Send Message</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
